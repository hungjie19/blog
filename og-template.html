<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <title>OG Tool - Jasper Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;900&family=Noto+Sans+TC:wght@600;700;900&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700;8..60,900&family=Noto+Serif+TC:wght@600;700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #141414;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 64px;
      gap: 18px;
      font-family: 'Geist', system-ui, sans-serif;
      color: #e0e0e0;
    }

    .label {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
      width: 1200px;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 1200px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 320px;
      padding: 10px 14px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    input:focus {
      border-color: #555;
    }

    input::placeholder {
      color: #6b7280;
    }

    select,
    button {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      background: #1c1c1c;
      color: #e0e0e0;
    }

    button {
      background: #ffffff;
      color: #000;
      font-weight: 600;
      border: none;
    }

    button:hover {
      opacity: 0.85;
    }

    .hint {
      width: 1200px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
    }

    .hint b {
      color: #9ca3af;
    }

    #card {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .safe {
      position: absolute;
      left: 120px;
      right: 120px;
      top: 76px;
      bottom: 96px;
      display: flex;
      flex-direction: column;
    }

    .title-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .title {
      text-align: center;
      color: #f5f5f4;
      line-height: 1.18;
      width: 100%;
    }

    .title .line {
      display: block;
    }

    .title .line span {
      display: inline-block;
    }

    #card.font-serif-mix .title {
      font-family: 'Source Serif 4', 'Noto Serif TC', serif;
      letter-spacing: 0;
    }

    #card.font-serif-cjk .title {
      font-family: 'Noto Serif TC', 'Source Serif 4', serif;
      letter-spacing: 0;
    }

    #card.font-sans-mix .title {
      font-family: 'Geist', 'Noto Sans TC', sans-serif;
      letter-spacing: -0.02em;
    }

    #card.font-sans-cjk .title {
      font-family: 'Noto Sans TC', 'Geist', sans-serif;
      letter-spacing: -0.01em;
    }

    .sign {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 34px;
      display: none;
      justify-content: center;
    }

    #card.show-jh .sign {
      display: flex;
    }

    .sign svg {
      width: 60px;
      height: 60px;
      display: block;
      opacity: 0.95;
    }

    .top-bar,
    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      height: 24px;
      background: #60a5fa;
      display: none;
    }

    .top-bar {
      top: 0;
    }

    .bottom-bar {
      bottom: 0;
    }

    #card.bar-bottom .bottom-bar {
      display: block;
    }

    #card.bar-both .bottom-bar,
    #card.bar-both .top-bar {
      display: block;
    }
  </style>
</head>

<body>

  <div class="label">Jasper Blog OG Image - 1200 × 630</div>

  <div class="controls">
    <input id="titleInput" value="OG Image|設計思路與|Build-time 生成" oninput="render()"
      placeholder="標題；用 | 手動斷行，例如 主題：|展開的內容">
    <select id="fontSel" onchange="render()">
      <option value="font-serif-mix">Serif mix（Source Serif + Noto Serif TC）</option>
      <option value="font-serif-cjk">Serif CJK（Noto Serif TC only）</option>
      <option value="font-sans-mix">Sans mix（Geist + Noto Sans TC）</option>
      <option value="font-sans-cjk" selected>Sans CJK（Noto Sans TC only）</option>
    </select>
    <select id="weightSel" onchange="render()">
      <option value="600" selected>Weight 600</option>
      <option value="700">Weight 700</option>
      <option value="900">Weight 900</option>
    </select>
    <select id="barSel" onchange="render()">
      <option value="none">藍線：無</option>
      <option value="bottom" selected>藍線：只下</option>
      <option value="both">藍線：上下</option>
    </select>
    <label
      style="display:flex;align-items:center;gap:6px;padding:0 4px;font-size:13px;color:#9ca3af;cursor:pointer;white-space:nowrap;">
      <input type="checkbox" id="jhToggle" onchange="render()" checked
        style="min-width:auto;flex:none;width:16px;height:16px;cursor:pointer;"> 中下小 JH
    </label>
    <button onclick="downloadPng()">Download PNG</button>
  </div>

  <div class="hint">
    用 <b>|</b> 指定換行；沒有 | 時整句自動縮放。字級會自動填滿安全框。
  </div>

  <div id="card" class="font-sans-cjk bar-bottom show-jh">
    <div class="top-bar"></div>
    <div class="safe">
      <div class="title-wrap">
        <div class="title" id="titleEl"></div>
      </div>
    </div>

    <div class="sign">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-label="JH">
        <g fill="#60a5fa" transform="translate(-12 0) translate(627 627) scale(1.32) translate(-627 -627)">
          <rect x="265" y="285" width="435" height="150" rx="16" />
          <rect x="560" y="285" width="140" height="470" />
          <path
            d="M 264.5 748 A 217.5 217.5 0 0 0 482 965.5 A 217.5 217.5 0 0 0 699.5 748 L 559.5 748 A 77.5 77.5 0 0 1 482 825.5 A 77.5 77.5 0 0 1 404.5 748 Z" />
          <rect x="265" y="685" width="140" height="70" />
          <rect x="830" y="285" width="140" height="690" rx="16" />
          <rect x="690" y="525" width="150" height="165" />
        </g>
      </svg>
    </div>

    <div class="bottom-bar"></div>
  </div>

  <script>
    const card = document.getElementById('card');
    const titleEl = document.getElementById('titleEl');

    const MAX = 112;
    const MIN = 40;

    function buildLines() {
      const raw = document.getElementById('titleInput').value;
      const parts = raw.split('|').map(s => s.trim()).filter(Boolean);
      titleEl.innerHTML = parts
        .map(p => `<div class="line"><span>${ escapeHtml(p) }</span></div>`)
        .join('');
    }

    function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    function fit() {
      const wrap = titleEl.parentElement;
      const availW = wrap.clientWidth;
      const availH = wrap.clientHeight;
      const spans = [...titleEl.querySelectorAll('.line span')];
      let size = MAX;
      titleEl.style.fontSize = size + 'px';
      while (size > MIN) {
        const widest = Math.max(...spans.map(s => s.getBoundingClientRect().width));
        const tall = titleEl.getBoundingClientRect().height;
        if (widest <= availW && tall <= availH) break;
        size -= 2;
        titleEl.style.fontSize = size + 'px';
      }
    }

    function render() {
      card.className = document.getElementById('fontSel').value;
      card.classList.add('bar-' + document.getElementById('barSel').value);
      card.classList.toggle('show-jh', document.getElementById('jhToggle').checked);
      titleEl.style.fontWeight = document.getElementById('weightSel').value;
      buildLines();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(fit);
      }
      fit();
    }

    async function downloadPng() {
      await (document.fonts ? document.fonts.ready : Promise.resolve());
      fit();
      const canvas = await html2canvas(card, {
        width: 1200, height: 630, scale: 2, useCORS: true, logging: false,
        backgroundColor: '#0a0a0a'
      });
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'og-jasper.png';
        a.click();
      });
    }

    render();
    window.addEventListener('load', render);
  </script>
</body>

</html>
