<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>OG Tool — Jasper Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
      gap: 24px;
      font-family: 'Geist', system-ui, sans-serif;
    }

    .label {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
      width: 1200px;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 1200px;
    }

    input {
      flex: 1;
      padding: 9px 14px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #444; }
    input::placeholder { color: #a1a1aa; }

    button {
      padding: 9px 20px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    /* ── OG Card 1200×630 ── */
    #card {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    /* 安全區 1080×(630-33-57)px，左右各 60px、上 33px、下 33px+24px bar */
    .safe-zone {
      position: absolute;
      left: 60px;
      right: 60px;
      top: 33px;
      bottom: 57px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* 底部藍線，全寬不受安全區限制 */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      background: #60a5fa;
    }

    /* Header：avatar + blog name */
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding-top: 20px;
      padding-left: 20px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 50%;
      flex-shrink: 0;
      border: 1.5px solid #1e1e1e;
    }

    .blog-name {
      font-size: 48px;
      font-weight: 400;
      color: #d4d4d4;
      letter-spacing: -0.02em;
    }

    /* Title */
    .title-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      font-size: 80px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.03em;
      text-align: center;
      word-break: break-word;
    }

    /* URL */
    .url {
      font-size: 48px;
      font-weight: 400;
      color: #3a3a3a;
      letter-spacing: -0.02em;
      text-align: center;
    }
  </style>
</head>
